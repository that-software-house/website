[build]
  command = "yarn build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai"]

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "yarn dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
